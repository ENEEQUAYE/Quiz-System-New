<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>CESSTIG Quiz System | Reset Password</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
	<link rel="shortcut icon" href="img/company logo.png" type="image/x-icon">
	<link rel="stylesheet" href="css/login.css">
	<style>
		#resetError,
		#resetSuccess {
			display: none;
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="logo-circle">
			<img src="img/company logo.png" alt="logo">
		</div>
		<div class="title fs-3 fw-bold text-center">Reset Your Password</div>
		<div class="subtitle mb-4 text-center">Enter a new secure password</div>

		<div class="form-box">
			<form id="resetPasswordForm">
				<div class="alert alert-danger" id="resetError"></div>
				<div class="alert alert-success" id="resetSuccess"></div>

				<div class="password-container mb-3">
					<label for="newPassword" class="form-label">New Password</label>
					<input type="password" class="form-control" id="newPassword" placeholder="Enter new password" required />
					<span class="toggle-eye" onclick="togglePassword('newPassword', this)"><i class="fas fa-eye"></i></span>
				</div>

				<div class="password-container mb-3">
					<label for="confirmPassword" class="form-label">Confirm New Password</label>
					<input type="password" class="form-control" id="confirmPassword" placeholder="Confirm new password" required />
					<span class="toggle-eye" onclick="togglePassword('confirmPassword', this)"><i class="fas fa-eye"></i></span>
				</div>

				<button class="btn" type="submit" id="resetBtn">Reset Password</button>
				<div class="text-center mt-3">
					<a href="index.html">Back to login</a>
				</div>
			</form>
		</div>
	</div>

	<script src="js/config.js"></script>
	<script>
		const API_BASE_URL = API_URL;
		const resetForm = document.getElementById('resetPasswordForm');
		const resetError = document.getElementById('resetError');
		const resetSuccess = document.getElementById('resetSuccess');
		const resetBtn = document.getElementById('resetBtn');
		const newPasswordInput = document.getElementById('newPassword');
		const confirmPasswordInput = document.getElementById('confirmPassword');

		function getResetToken() {
			const params = new URLSearchParams(window.location.search);
			return params.get('token') || '';
		}

		function togglePassword(inputId, eyeIcon) {
			const input = document.getElementById(inputId);
			const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
			input.setAttribute('type', type);
			eyeIcon.innerHTML = type === 'text' ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
		}

		async function parseResponseData(response) {
			const contentType = response.headers.get('content-type') || '';

			if (contentType.includes('application/json')) {
				return response.json();
			}

			const text = await response.text();
			return { error: text || `HTTP ${response.status}` };
		}

		resetForm.addEventListener('submit', async function (event) {
			event.preventDefault();
			resetError.style.display = 'none';
			resetSuccess.style.display = 'none';

			const token = getResetToken();
			const password = newPasswordInput.value;
			const confirmPassword = confirmPasswordInput.value;

			if (!token) {
				resetError.textContent = 'Missing reset token. Please request a new reset link.';
				resetError.style.display = 'block';
				return;
			}

			if (password.length < 6) {
				resetError.textContent = 'Password must be at least 6 characters long.';
				resetError.style.display = 'block';
				return;
			}

			if (password !== confirmPassword) {
				resetError.textContent = 'Passwords do not match.';
				resetError.style.display = 'block';
				return;
			}

			resetBtn.disabled = true;
			resetBtn.innerHTML = `Resetting... <span class="spinner-border spinner-border-sm"></span>`;

			try {
				const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json'
					},
					body: JSON.stringify({ token, password })
				});

				const data = await parseResponseData(response);

				if (!response.ok) {
					throw new Error(data.error || 'Failed to reset password');
				}

				resetSuccess.textContent = data.message || 'Password has been reset successfully. Redirecting to login...';
				resetSuccess.style.display = 'block';
				resetForm.reset();

				setTimeout(() => {
					window.location.href = 'index.html';
				}, 2000);
			} catch (error) {
				resetError.textContent = error.message === 'Failed to fetch'
					? 'Unable to connect to the server. Please try again later.'
					: error.message;
				resetError.style.display = 'block';
			} finally {
				resetBtn.disabled = false;
				resetBtn.innerHTML = 'Reset Password';
			}
		});
	</script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
